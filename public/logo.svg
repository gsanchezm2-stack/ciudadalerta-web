<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065A82;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#028090;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#028090;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Shield background -->
  <path d="M100 10 L180 50 L180 110 Q180 160 100 190 Q20 160 20 110 L20 50 Z" 
        fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Inner shield highlight -->
  <path d="M100 20 L170 55 L170 108 Q170 152 100 178 Q30 152 30 108 L30 55 Z" 
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  
  <!-- Bell icon -->
  <g transform="translate(100,75)">
    <!-- Bell body -->
    <path d="M-25 0 Q-25 -30 0 -35 Q25 -30 25 0 L28 5 L-28 5 Z" 
          fill="url(#grad2)"/>
    <!-- Bell clapper -->
    <circle cx="0" cy="12" r="6" fill="#fff"/>
    <!-- Bell top -->
    <circle cx="0" cy="-35" r="5" fill="#fff"/>
    <!-- Sound waves -->
    <path d="M32 -5 Q40 -5 40 5" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M36 -12 Q48 -12 48 8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Letters CA -->
  <text x="100" y="145" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="38" font-weight="800" fill="#fff" letter-spacing="3">CA</text>
  
  <!-- Subtle line under text -->
  <line x1="65" y1="155" x2="135" y2="155" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
</svg>